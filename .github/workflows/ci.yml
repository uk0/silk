name: CI

# Pull-request validation. The main branch is intentionally NOT a trigger
# — pushes to main are local merges, not events that should consume
# Actions minutes. Tag pushes are handled by release.yml.
on:
  pull_request:
    branches: [main, opengl]

jobs:
  test:
    name: Test ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux
            os: ubuntu-latest
          - label: macos-arm
            os: macos-15
          - label: macos-intel
            os: macos-15-intel
          - label: windows
            os: windows-latest

    runs-on: ${{ matrix.os }}

    # Default shell. Overridden for Windows where the cairo cgo build
    # has to run inside an MSYS2 mingw64 environment so pkg-config
    # finds the cairo headers.
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install Cairo (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libcairo2-dev \
            libx11-dev libxcursor-dev libxi-dev \
            libxinerama-dev libxrandr-dev libxxf86vm-dev \
            libgl1-mesa-dev

      - name: Install Cairo (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cairo pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix)/lib/pkgconfig" >> $GITHUB_ENV
          echo "CGO_CFLAGS=-I$(brew --prefix)/include" >> $GITHUB_ENV
          echo "CGO_LDFLAGS=-L$(brew --prefix)/lib -lcairo" >> $GITHUB_ENV

      - name: Install MSYS2 + Cairo (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-cairo
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-gcc

      - name: Configure Windows cgo env
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          # Hand cgo the MSYS2 pkg-config + mingw64 toolchain so it
          # can resolve cairo. setup-go's GOROOT/PATH ordering puts
          # the Microsoft runtime in front of mingw64; clobber that
          # so cgo picks up the gcc we just installed.
          echo "PKG_CONFIG_PATH=/mingw64/lib/pkgconfig" >> $GITHUB_ENV
          echo "CC=gcc" >> $GITHUB_ENV
          echo "CXX=g++" >> $GITHUB_ENV
          echo "/c/msys64/mingw64/bin" >> $GITHUB_PATH

      - name: Vet
        run: go vet ./core/ ./geom/ ./paint/ ./gui/ ./graph/ ./prop/ ./ged/ ./data/ ./driver/ ./device/ ./historian/ ./report/ ./recipe/ ./auth/ ./template/ ./calc/ ./eventlog/ ./gateway/ ./playback/ ./alarmbridge/ ./sim/ ./login/ ./stats/ ./script/ ./locator/ ./filesearch/ ./snippet/ ./buildissues/

      # Split into groups: building every cgo test binary in one invocation can
      # exhaust the runner (cairo + sqlite amalgamation compile at once).
      - name: Test (core UI)
        run: go test -short -count=1 ./core/ ./geom/ ./paint/ ./gui/ ./graph/ ./prop/ ./ged/

      - name: Test (SCADA backend)
        run: go test -short -count=1 ./data/ ./driver/ ./device/ ./historian/ ./report/ ./recipe/ ./auth/ ./template/ ./calc/ ./eventlog/ ./gateway/ ./playback/ ./alarmbridge/ ./sim/ ./login/ ./stats/ ./script/

      - name: Test (IDE engines)
        run: go test -short -count=1 ./locator/ ./filesearch/ ./snippet/ ./buildissues/

      - name: Build legacy entry points
        if: runner.os != 'Windows'
        run: |
          go build -v -o /tmp/silk-designer design.go
          go build -v -o /tmp/silk-demo demo.go

      - name: Build silkide
        if: runner.os != 'Windows'
        run: go build -v -o /tmp/silkide ./cmd/silkide/

      - name: Build silkide (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: go build -v -o silkide.exe ./cmd/silkide/

      - name: Build silkgen
        run: go build -v ./cmd/silkgen/
